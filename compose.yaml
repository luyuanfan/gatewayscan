# Run docker compose up, wait for it to initialize completely, 
# and visit http://localhost:8080 or http://host-ip:8080 (as appropriate).

services:

  postgres:
    image: postgres:17
    container_name: gateway-db
    ports:
      - 6789:5432
    restart: always
    volumes:
     - type: bind
       source: /cdbdata
       target: /cdbdata
     - type: bind
       source: /cdbdata/pgdata
       target: /var/lib/postgresql/data
    environment:
      POSTGRES_USER: lyspfan
      POSTGRES_PASSWORD: lyspfan
      PGDATA: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lyspfan --quiet"]
      interval: 10s
      timeout: 10s
      start_period: 30s
      retries: 3

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gateway-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: lyspfan@gmail.com 
      PGADMIN_DEFAULT_PASSWORD: lyspfan
    ports:
      - 9876:80
    depends_on:
      postgres:
        condition: service_healthy

  adminer:
    image: adminer
    container_name: gateway-adminer
    restart: always
    ports:
      - 8080:8080